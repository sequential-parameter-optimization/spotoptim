# =============================================================================
# .github/workflows/ci.yml  —  Continuous Integration
# =============================================================================
#
# Jobs:
#   reuse      — REUSE licence compliance (PR + push)
#   test       — pytest + coverage upload (PR + push, Python 3.13)
#   lint       — black / isort / ruff formatting checks (non-blocking)
#   security   — safety + bandit vulnerability scans (non-blocking)
#
# Note: Linear-history enforcement (no merge commits) is handled by GitHub's
# built-in "Require linear history" branch-protection rule, which is faster,
# more reliable, and blocks the merge button before CI even starts.
# The previous `no-merge-commits` CI job has been removed.
# =============================================================================

name: CI Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.13"
  # Pinned action SHAs — single source of truth for the whole file
  CHECKOUT_SHA:    "34e114876b0b11c390a56381ad16ebd13914f8d5"  # actions/checkout v4.2.2
  SETUP_PYTHON_SHA: "a26af69be951a213d495a4c3e4e4022e16d87065" # actions/setup-python v5.4.0
  SETUP_UV_SHA:    "d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86"  # astral-sh/setup-uv v5.3.1
  CODECOV_SHA:     "b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238"  # codecov/codecov-action v4.6.0

jobs:

  # ---------------------------------------------------------------------------
  # REUSE licence compliance
  # ---------------------------------------------------------------------------
  reuse:
    name: REUSE Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1

      - name: Run reuse lint
        run: uv tool run reuse lint

  # ---------------------------------------------------------------------------
  # Test matrix
  # ---------------------------------------------------------------------------
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run pytest
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=src/spotoptim \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Code quality (non-blocking — continue-on-error keeps PRs unblocked)
  # ---------------------------------------------------------------------------
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Check formatting with black
        run: uv run black --check src/ tests/
        continue-on-error: true

      - name: Check imports with isort
        run: uv run isort --check-only src/ tests/
        continue-on-error: true

      - name: Lint with ruff
        run: uv run ruff check src/ tests/
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Security scan (non-blocking)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Dependency vulnerability check (safety)
        run: uv run safety check --json
        continue-on-error: true

      - name: Static security analysis (bandit)
        run: uv run bandit -r src/spotoptim/ -f json -o bandit-report.json
        continue-on-error: true
