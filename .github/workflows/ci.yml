# =============================================================================
# .github/workflows/ci.yml  —  Continuous Integration
# =============================================================================

name: CI Tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:

  # ---------------------------------------------------------------------------
  # Guard: reject PRs that contain merge commits (enforces linear history)
  # ---------------------------------------------------------------------------
  no-merge-commits:
    name: Linear History Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          fetch-depth: 0

      - name: Reject merge commits on PR branch
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          MERGES=$(git log --merges --oneline "${BASE}..${HEAD}")
          if [ -n "$MERGES" ]; then
            echo "::error::PR branch contains merge commits. Please rebase instead of merging:"
            echo "$MERGES"
            echo ""
            echo "Fix with: git rebase origin/${{ github.base_ref }} && git push --force-with-lease"
            exit 1
          fi
          echo "✅ No merge commits found — linear history confirmed."

  # ---------------------------------------------------------------------------
  # REUSE licence compliance
  # ---------------------------------------------------------------------------
  reuse:
    name: REUSE Compliance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1

      - name: Run reuse lint
        run: uv tool run reuse lint

  # ---------------------------------------------------------------------------
  # Test matrix (Python 3.13 stable, consistent with docs.yml and release.yml)
  # ---------------------------------------------------------------------------
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run pytest
        run: |
          uv run pytest tests/ -v --tb=short --cov=src/spotoptim --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Code quality (non-blocking: continue-on-error keeps PRs unblocked)
  # ---------------------------------------------------------------------------
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Check formatting with black
        run: uv run black --check src/ tests/
        continue-on-error: true

      - name: Check imports with isort
        run: uv run isort --check-only src/ tests/
        continue-on-error: true

      - name: Lint with ruff
        run: uv run ruff check src/ tests/
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Security scan (non-blocking)
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Check dependencies with safety
        run: uv run safety check --json
        continue-on-error: true

      - name: Security scan with bandit
        run: uv run bandit -r src/spotoptim/ -f json -o bandit-report.json
        continue-on-error: true
