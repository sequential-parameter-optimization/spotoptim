# =============================================================================
# .github/workflows/docs.yml  —  Documentation Build & Deploy (Optimised v2)
# =============================================================================
#
# Performance optimisations (cumulative with v1):
#   1. Concurrency groups       → cancel stale doc builds on same branch
#   2. Quarto _freeze/ cache    → skip re-executing unchanged notebooks
#   3. Broader restore-keys     → partial cache hits still save time
#   4. Full .venv caching       → near-instant installs on cache hit
#   5. CPU-only PyTorch          → avoids 2 GB CUDA download
#   6. Removed `quarto check`  → saves ~30s, not needed for builds
#   7. Path filters              → only trigger when docs/code actually change
#   8. Job-level timeout        → prevents runaway notebook execution
#   9. Split build/deploy       → deploy is instant; build can be parallelised
#
# Pipeline:
#   build-docs:
#     1. Checkout (full history for cross-refs)
#     2. Set up Python + uv (with venv cache)
#     3. Install Python dependencies (CPU-only torch)
#     4. Install Quarto CLI (pinned)
#     5. Restore _freeze/ cache from prior runs
#     6. Generate API reference with quartodoc
#     7. Render Quarto site (incremental, using freeze)
#     8. Upload _site artifact
#   deploy (main only):
#     9. Download _site artifact
#    10. Deploy to gh-pages
# =============================================================================

name: Documentation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'docs/**'
      - '_quarto.yml'
      - 'src/spotoptim/**'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - '_quarto.yml'
      - 'src/spotoptim/**'
      - 'pyproject.toml'
  workflow_dispatch:

# Cancel in-flight doc builds on the same branch
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  QUARTO_VERSION: "1.8.27"
  PYTHON_VERSION: "3.13"
  # PyTorch CPU-only index is configured in pyproject.toml [tool.uv.sources]

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Cache the full .venv to avoid rebuilding torch/xgboost/scipy
      - name: Cache virtual environment
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: .venv
          key: venv-docs-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            venv-docs-${{ runner.os }}-py${{ env.PYTHON_VERSION }}-

      - name: Install Python dependencies
        run: uv sync --all-extras --group dev

      - name: Install Quarto CLI ${{ env.QUARTO_VERSION }}
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.1.2
        with:
          version: ${{ env.QUARTO_VERSION }}

      # Restore Quarto _freeze/ cache (executed notebook outputs).
      # This is the single biggest performance win for docs: unchanged
      # notebooks are not re-executed, saving potentially hours of compute.
      # Use a two-tier key: exact match on content, fallback to any prior freeze.
      - name: Restore Quarto freeze cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: _freeze
          key: quarto-freeze-${{ runner.os }}-${{ hashFiles('docs/**/*.qmd', 'src/spotoptim/**/*.py') }}
          restore-keys: |
            quarto-freeze-${{ runner.os }}-

      - name: Generate API reference with quartodoc
        run: |
          uv run python docs/quartodoc_build.py
          uv run quartodoc interlinks

      # Render WITHOUT --no-cache so Quarto uses _freeze/ for unchanged pages
      - name: Render Quarto site
        run: uv run quarto render

      # Upload _site as artifact for the deploy job (and for PR preview)
      - name: Upload site artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: docs-site
          path: _site
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Deploy — only from main branch, downloads pre-built site
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download site artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: docs-site
          path: _site

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b # v2.1.2
        with:
          target: gh-pages
          path: _site
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
