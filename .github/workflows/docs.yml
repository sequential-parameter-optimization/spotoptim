# =============================================================================
# .github/workflows/docs.yml  —  Manual Documentation Rebuild
# =============================================================================
# Use workflow_dispatch to manually rebuild docs without a release.
# Normal doc deployment happens automatically inside release.yml.
# =============================================================================

name: Documentation

on:
  workflow_dispatch:

permissions: read-all

concurrency:
  group: docs-deploy
  cancel-in-progress: false

env:
  QUARTO_VERSION: "1.8.27"
  PYTHON_VERSION: "3.13"

jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,docs]"

      - name: Install Quarto CLI ${{ env.QUARTO_VERSION }}
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          version: ${{ env.QUARTO_VERSION }}

      - name: Generate API reference with quartodoc
        run: |
          uv run python docs/quartodoc_build.py
          uv run quartodoc interlinks

      - name: Render Quarto site
        run: uv run quarto render

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          target: gh-pages
          path: _site
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
