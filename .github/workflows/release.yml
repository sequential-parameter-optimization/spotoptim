# =============================================================================
# .github/workflows/release.yml  —  Semantic Release + PyPI + Docs
# =============================================================================
# Triggers on every push to main.
# 1. Runs tests to gate the pipeline.
# 2. Semantic-release checks conventional commits — if a releasable change
#    is found (feat:, fix:, etc.) it bumps version, publishes to PyPI,
#    and creates a GitHub release.
# 3. Builds and deploys quartodoc documentation to GitHub Pages.
# =============================================================================

name: Release

on:
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Python + uv ──────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,docs]"

      # ── Tests ─────────────────────────────────────────────────────────
      - name: Run tests
        run: uv run pytest tests/ -v -n auto --tb=short

      # ── Semantic Release ──────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/git@10
            @semantic-release/changelog@6
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish to PyPI (only when a new version was released) ────────
      - name: Publish to PyPI
        if: steps.release.outputs.new-release-published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      # ── Documentation ─────────────────────────────────────────────────
      - name: Install Quarto CLI
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.8.27"

      - name: Generate API reference
        run: |
          uv run --extra docs python docs/quartodoc_build.py
          uv run --extra docs quartodoc interlinks

      - name: Render documentation
        run: uv run --extra docs quarto render --no-cache

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: _site
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
