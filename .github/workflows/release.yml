# =============================================================================
# .github/workflows/release.yml  — Automatic Semantic Releases
# =============================================================================
#
# Triggered by the Release Preflight workflow succeeding on main.
# Steps:
#   1. Checkout main (SHA-pinned, not PR SHA — see security note)
#   2. Verify checkout integrity
#   3. Semantic Release (version bump, changelog, GitHub Release tag)
#   4. Build wheel + sdist
#   5. Publish to PyPI via Trusted Publisher (OIDC)
#   6. Verify PyPI availability
# =============================================================================

name: Release

on:
  workflow_run:
    workflows:
      - Release Preflight
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        !contains(github.event.workflow_run.head_commit.message, 'chore(release)')
      )
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.2.2
        with:
          # Always checkout the trusted branch tip, never an arbitrary SHA from
          # the workflow_run event payload (prevents untrusted-checkout/critical).
          ref: refs/heads/main
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checkout integrity
        run: |
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            EXPECTED_SHA="${{ github.event.workflow_run.head_sha }}"
            if [ "${ACTUAL_SHA}" != "${EXPECTED_SHA}" ]; then
              echo "::error::HEAD SHA (${ACTUAL_SHA}) does not match triggering SHA (${EXPECTED_SHA}). Aborting."
              exit 1
            fi
          fi
          echo "✓ Checkout integrity verified: ${ACTUAL_SHA}"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.4.0
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.3.1
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python dependencies
        run: uv sync --all-extras --group dev

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g semantic-release@23 \
            @semantic-release/git@10 \
            @semantic-release/changelog@6 \
            @semantic-release/exec@6 \
            conventional-changelog-conventionalcommits@7

      - name: Configure authenticated Git remote
        env:
          RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || github.token }}
        run: |
          git remote set-url origin https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git

      - name: Semantic Release
        env:
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || github.token }}
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || github.token }}
        run: npx semantic-release

      - name: Check if release generated dist/
        id: check_dist
        run: |
          if [ -d "dist" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to PyPI
        if: steps.check_dist.outputs.exists == 'true'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          # Trusted Publisher (OIDC) — configure once at:
          # pypi.org/manage/project/spotoptim/settings/publishing/
          # Owner: sequential-parameter-optimization | Repo: spotoptim | Workflow: release.yml

      - name: Verify PyPI availability
        if: steps.check_dist.outputs.exists == 'true'
        run: |
          echo "Release completed. Waiting for PyPI to index the new version..."
          for i in {1..30}; do
            if python -c "import urllib.request; urllib.request.urlopen('https://pypi.org/project/spotoptim/')" 2>/dev/null; then
              echo "✓ Package found on PyPI"
              break
            fi
            echo "Waiting... (attempt $i/30)"
            sleep 10
          done
