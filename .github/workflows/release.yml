# =============================================================================
# .github/workflows/release.yml  —  Semantic Release + PyPI + Docs
# =============================================================================
# Triggers on push to main (i.e. when a PR from develop is merged).
# Semantic-release analyses conventional commits and, if a releasable
# change is found (feat:, fix:, etc.), bumps the version, publishes to
# PyPI, deploys documentation, and creates a back-merge PR.
# =============================================================================

name: Release

on:
  push:
    branches:
      - main

permissions: read-all

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write          # needed for PyPI OIDC trusted publishers
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout — keep credentials so semantic-release can push tags
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # persist-credentials defaults to true; GITHUB_TOKEN is used for
          # git push operations by semantic-release.

      # ------------------------------------------------------------------
      # 2. Python + uv
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv pip install --system build
          uv pip install --system -e ".[dev,docs]"

      # ------------------------------------------------------------------
      # 3. Tests — gate the release on passing tests
      # ------------------------------------------------------------------
      - name: Run tests
        run: uv run pytest tests/ -v -n auto --tb=short

      # ------------------------------------------------------------------
      # 4. Build distribution
      # ------------------------------------------------------------------
      - name: Build distribution packages
        run: |
          rm -rf dist/ build/
          uv build
          echo "Build artifacts:"
          ls -lah dist/

      # ------------------------------------------------------------------
      # 5. Semantic Release (Node.js)
      # ------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/git@10
            @semantic-release/changelog@6
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # 6. Publish to PyPI (OIDC trusted publisher — no token needed)
      # ------------------------------------------------------------------
      - name: Publish to PyPI
        if: success()
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

      # ------------------------------------------------------------------
      # 7. Documentation — quartodoc + Quarto → GitHub Pages
      # ------------------------------------------------------------------
      - name: Install Quarto CLI
        if: success()
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.8.27"

      - name: Generate API reference stubs
        if: success()
        run: |
          uv run --extra docs python docs/quartodoc_build.py
          uv run --extra docs quartodoc interlinks

      - name: Build documentation
        if: success()
        run: uv run quarto render --no-cache

      - name: Deploy documentation to GitHub Pages
        if: success()
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
          path: _site
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Back-merge: keep develop in sync after every main release
  # ---------------------------------------------------------------------------
  back-merge:
    name: Back-merge main → develop
    runs-on: ubuntu-latest
    needs: release
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check whether a back-merge is needed
        id: sync-check
        run: |
          git fetch origin develop
          AHEAD=$(git rev-list --count origin/develop..HEAD)
          echo "main is ${AHEAD} commit(s) ahead of develop"
          echo "needed=${AHEAD}" >> "$GITHUB_OUTPUT"

      - name: Open back-merge PR (main → develop)
        if: steps.sync-check.outputs.needed != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')

          EXISTING=$(gh pr list \
            --base develop --head main \
            --state open \
            --json number \
            --jq '.[0].number' 2>/dev/null || true)

          if [ -n "$EXISTING" ]; then
            echo "Back-merge PR #${EXISTING} already open — nothing to do."
            exit 0
          fi

          gh pr create \
            --base develop \
            --head main \
            --title "chore: back-merge release ${VERSION} (main → develop)" \
            --body "Automated back-merge. Release ${VERSION} committed updated files (CHANGELOG.md, pyproject.toml) to main. This PR syncs those changes into develop."
          echo "✓ Back-merge PR created for release ${VERSION}"
