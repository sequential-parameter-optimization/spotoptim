# =============================================================================
# .github/workflows/release.yml  —  Semantic Release + PyPI + Docs
# =============================================================================
# Triggers on every push to main.
# 1. Runs tests to gate the pipeline.
# 2. Semantic-release checks conventional commits — if a releasable change
#    is found (feat:, fix:, etc.) it bumps version, publishes to PyPI,
#    and creates a GitHub release.
# 3. Builds and deploys quartodoc documentation to GitHub Pages.
# =============================================================================

name: Release

on:
  push:
    branches: [main]

permissions: read-all

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # ── Python + uv ──────────────────────────────────────────────────
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2

      - name: Install dependencies
        run: uv pip install --system -e ".[dev,docs]"

      # ── Tests ─────────────────────────────────────────────────────────
      - name: Run tests
        run: uv run pytest tests/ -v -n auto --tb=short

      # ── Semantic Release ──────────────────────────────────────────────
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        with:
          extra_plugins: |
            @semantic-release/git@10
            @semantic-release/changelog@6
            @semantic-release/exec@6
            conventional-changelog-conventionalcommits@8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Publish to PyPI (only when a new version was released) ────────
      - name: Publish to PyPI
        if: steps.release.outputs.new-release-published == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          skip-existing: true

      # ── Documentation ─────────────────────────────────────────────────
      - name: Install Quarto CLI
        uses: quarto-dev/quarto-actions/setup@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          version: "1.8.27"

      - name: Generate API reference
        run: |
          uv run --extra docs python docs/quartodoc_build.py
          uv run --extra docs quartodoc interlinks

      - name: Render documentation
        run: uv run --extra docs quarto render

      - name: Deploy to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@8a96df13519ee81fd526f2dfca5962811136661b # v2.2.0
        with:
          target: gh-pages
          path: _site
          render: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
