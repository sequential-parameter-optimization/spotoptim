# =============================================================================
# .github/workflows/release-preflight.yml  — Release Permission Preflight
# =============================================================================

name: Release Preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main

# Only one preflight at a time per branch
concurrency:
  group: release-preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    name: Validate release permissions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0

      - name: Verify SEMANTIC_RELEASE_TOKEN is configured
        env:
          RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TOKEN:-}" ]; then
            echo "::error title=Missing secret::SEMANTIC_RELEASE_TOKEN is not set."
            echo "::error::Create a fine-grained PAT (or classic PAT with 'repo' scope) and add it"
            echo "::error::as a repository secret named SEMANTIC_RELEASE_TOKEN:"
            echo "::error::  Settings → Secrets and variables → Actions → New repository secret"
            echo "::error::The token needs Contents: Read and write on this repository."
            echo "::error::github.token cannot be used here — org-level Actions permissions restrict it to read-only."
            exit 1
          fi

      - name: Configure Git credentials
        env:
          RELEASE_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          # Disable any credential helpers the runner may have configured
          # (gh CLI, credential-manager, etc.) that can intercept push auth.
          git config --local --unset-all credential.helper || true
          git config --local credential.helper ''
          # Use the extraheader method — the same mechanism actions/checkout
          # uses internally. Works reliably for both fetch and push.
          BASIC=$(echo -n "x-access-token:${RELEASE_TOKEN}" | base64)
          git config --local http.https://github.com/.extraheader "AUTHORIZATION: basic ${BASIC}"

      - name: Preflight token and push checks
        run: |
          set -euo pipefail

          echo "Checking authenticated read access to ${GITHUB_REPOSITORY}..."
          git ls-remote --exit-code origin HEAD >/dev/null

          echo "Checking write access via dry-run push to unprotected ref..."
          test_ref="refs/preflight/sr-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          if ! git push --dry-run origin "HEAD:${test_ref}" 2>&1; then
            echo "::error::SEMANTIC_RELEASE_TOKEN cannot push to ${GITHUB_REPOSITORY}."
            echo "::error::Ensure the PAT has Contents: Read and write (fine-grained) or 'repo' scope (classic)."
            echo "::error::For org repos, verify the fine-grained PAT was approved in org settings."
            exit 1
          fi

          echo "Preflight passed: token and push permissions are sufficient for semantic-release."
